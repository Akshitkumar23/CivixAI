version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_ML_API_URL=http://ml-api:8001
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - ml-api

  ml-api:
    build:
      context: .
      dockerfile: services/ml_api/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
      - ./services/ml:/app/services/ml
    environment:
      - PORT=8001
